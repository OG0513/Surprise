<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>The Garden</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Root Application Container -->
  <main id="app-root" class="app-root" aria-hidden="true">
    
    <!-- 1. Loading Layer (Version 1.2 Immersive Entry) -->
    <div id="layer-loading" class="layer layer-loading">
      <canvas id="loading-canvas" class="loading-canvas"></canvas>
      <div class="loading-container">
        <svg class="monogram-svg" viewBox="0 0 200 100" aria-label="Personalized initials">
          <path class="draw-path path-left" d="M 45,25 C 35,25 30,35 30,45 C 30,65 50,75 65,75 C 75,75 80,70 80,60 C 80,50 70,45 60,50 C 50,55 55,65 65,65" />
          <path class="draw-path path-amp" d="M 103,63 C 97,57 93,51 98,45 C 102,40 106,44 102,50 C 96,57 91,61 106,65" />
          <path class="draw-path path-right" d="M 120,65 L 120,35 C 120,35 128,55 135,55 C 142,55 150,35 150,35 L 150,65 C 150,65 155,70 165,70" />
        </svg>
        <p class="loading-message">Someone made something special for you...</p>
      </div>
    </div>

    <!-- 2. World Container (Contains all core visual layers) -->
    <div id="layer-world" class="layer layer-world">
      
      <!-- Environment Layer (Version 1.3 Updated: Added Environment Canvas) -->
      <div id="layer-environment" class="layer sub-layer">
        <canvas id="environment-canvas" class="environment-canvas"></canvas>
      </div>

      <!-- Foreground Layer (Reserved for meadow, grass, flowers) -->
      <div id="layer-foreground" class="layer sub-layer"></div>

      <!-- Effects Layer (Reserved for fireflies, floating petals) -->
      <div id="layer-effects" class="layer sub-layer"></div>

      <!-- UI Layer (Reserved for minimal narrative overlay, letter interface) -->
      <div id="layer-ui" class="layer sub-layer"></div>

    </div>

    <!-- 3. Overlay Layer (Reserved for global transitions, vignettes, post-processing) -->
    <div id="layer-overlay" class="layer layer-overlay"></div>

  </main>

  <script src="script.js"></script>
</body>
</html>
